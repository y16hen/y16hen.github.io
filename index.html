<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬自訂跑酷遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
            font-family: 'Press Start 2P', monospace; /* 全域套用像素字體 */
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 350px; 
            background-color: transparent; 
            overflow: hidden;
            border: 4px solid #fff;
            cursor: pointer; /* 讓玩家知道這裡可以點擊 */
        }

        .cloud {
            position: absolute;
            width: 100px;  
            height: 50px; 
            background-image: url('cloud.png');
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 5;
        }

        #ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%; 
            height: 40px; 
            background-image: url('ground.png');
            background-size: contain; 
            background-repeat: repeat-x; 
            z-index: 10;
        }
        @keyframes scrollGround {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .moving-ground {
            animation: scrollGround 3s linear infinite;
        }

        /* 主角基礎設定 */
        #dino {
            position: absolute;
            bottom: 40px; 
            left: 50px;
            width: 130px;  
            height: 195px; 
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 20;
        }

        /* 動態切換跑步姿勢的 CSS Class */
        #dino.run-pose-1 { background-image: url('run1.png'); }
        #dino.run-pose-2 { background-image: url('run2.png'); }

        /* 躺平形態 */
        #dino.duck {
            width: 170px;
            height: 162px; 
            background-image: url('duck.png') !important; 
        }

        #obstacle-container {
            position: absolute;
            bottom: 40px; 
            left: 0;
            width: 100%;
            height: calc(100% - 40px);
            z-index: 15;
        }

        /* 書本貼齊最底端 */
        .book {
            position: absolute;
            bottom: 0;     
            width: 60px;  
            height: 70px; 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
        }

        /* 飛機 */
        .paper-plane {
            position: absolute;
            width: 70px;  
            height: 43px; 
            background-image: url('plane.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center center;
        }
        .paper-plane.high { bottom: 165px; } 
        .paper-plane.mid { bottom: 105px; } 
        .paper-plane.low { bottom: 0px; }    

        /* 分數面板像素風 */
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 16px;
            color: #fff; 
            z-index: 30;
            text-shadow: 3px 3px 0px #000;
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75); 
            z-index: 50;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        /* GAME OVER 像素風字體 */
        #game-over-text {
            font-size: 36px;
            color: #ff3333; 
            margin-bottom: 30px;
            text-shadow: 4px 4px 0px #000;
        }
        
        /* 重新開始按鈕 */
        #restart-button {
            font-family: 'Press Start 2P', monospace; 
            padding: 12px 24px;
            font-size: 14px;
            background-color: #fff;
            color: #000;
            border: 4px solid #000;
            cursor: pointer;
            box-shadow: 4px 4px 0px #555;
        }
        #restart-button:active {
            box-shadow: 1px 1px 0px #555;
            transform: translate(3px, 3px);
        }

        /* 開始畫面：💡 這裡已將黃色的字改為純白色 */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            z-index: 60;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #start-screen h2 {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 15px;
            color: #ffffff; /* 💡 修改為純白色 */
            text-shadow: 3px 3px 0px #000; /* 加入像素風黑色陰影 */
        }
        #start-screen p {
            font-size: 14px;
            color: #ccc;
            text-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score">SCORE:00000</div>
        <div id="ground"></div>
        <div id="dino" class="run-pose-1"></div>
        <div id="obstacle-container"></div>
        
        <div id="start-screen">
            <h2>點擊畫面或按【空白鍵】或【⬆️】<br>開始遊戲</h2>
            <p>【空白鍵 / ⬆️】跳躍 ｜ 按住【⬇️】躺平</p>
        </div>

        <div id="game-over-screen">
            <div id="game-over-text">GAME OVER</div>
            <button id="restart-button">RESTART</button>
        </div>
    </div>

    <script>
        window.focus(); // 💡 網頁載入時強制聚焦，避免鍵盤按鍵失效

        const container = document.getElementById('game-container');
        const dino = document.getElementById('dino');
        const ground = document.getElementById('ground');
        const obstacleContainer = document.getElementById('obstacle-container');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const restartButton = document.getElementById('restart-button');
        const startScreen = document.getElementById('start-screen');

        const GRAVITY = 1.6;          
        const JUMP_FORCE = -25;       
        const DINO_INITIAL_BOTTOM = 40;
        const PLANE_DELAY_SCORE = 150; 

        let isRunning = false;
        let isGameStarted = false;
        let isJumping = false;
        let isDucking = false;
        let dinoVelocityY = 0;
        let dinoBottom = DINO_INITIAL_BOTTOM;
        let score = 0;
        let speed = 6; 
        
        let obstacles = [];
        let clouds = [];
        let nextObstacleTime = 0;
        let nextCloudTime = 0;

        let animationFrameCount = 0;
        let currentPose = 1;

        function startGame() {
            if (isGameStarted) return;
            window.focus(); // 確保開始時焦點在網頁內
            isGameStarted = true;
            isRunning = true;
            startScreen.style.display = 'none';
            ground.classList.add('moving-ground');
            gameLoop();
        }

        // 監聽鍵盤按下
        document.addEventListener('keydown', (e) => {
            // 💡 如果遊戲還沒開始，按空白鍵或上方向鍵都可以直接觸發開始
            if (!isGameStarted) {
                if (e.code === 'Space' || e.key === ' ' || e.code === 'ArrowUp' || e.key === 'ArrowUp') {
                    startGame();
                    e.preventDefault(); // 防止空白鍵讓網頁滾動
                    return;
                }
            }
            
            if (!isRunning) return;
            
            if (e.code === 'Space' || e.key === ' ' || e.code === 'ArrowUp' || e.key === 'ArrowUp') {
                if (!isJumping && !isDucking) {
                    isJumping = true;
                    dinoVelocityY = JUMP_FORCE;
                }
                e.preventDefault();
            }
            if ((e.code === 'ArrowDown' || e.key === 'ArrowDown') && !isJumping && !isDucking) {
                isDucking = true;
                dino.classList.add('duck'); 
                e.preventDefault();
            }
        });

        // 監聽鍵盤放開
        document.addEventListener('keyup', (e) => {
            if (!isRunning) return;
            if (e.code === 'ArrowDown' || e.key === 'ArrowDown') {
                isDucking = false;
                dino.classList.remove('duck'); 
            }
        });

        // 💡 點擊整個遊戲畫面都可以直接開始遊戲
        container.addEventListener('click', () => {
            if (!isGameStarted) {
                startGame();
            }
        });

        function gameLoop() {
            if (!isRunning) return;
            updateDino();
            updateObstacles();
            updateClouds();
            updateScore();
            checkCollisions();
            requestAnimationFrame(gameLoop);
        }

        function updateDino() {
            if (isJumping) {
                dinoVelocityY += GRAVITY;
                dinoBottom -= dinoVelocityY;

                if (dinoBottom <= DINO_INITIAL_BOTTOM) {
                    dinoBottom = DINO_INITIAL_BOTTOM;
                    isJumping = false;
                    dinoVelocityY = 0;
                }
            }
            dino.style.bottom = `${dinoBottom}px`;

            if (!isJumping && !isDucking) {
                animationFrameCount++;
                if (animationFrameCount >= 9) { 
                    animationFrameCount = 0;
                    if (currentPose === 1) {
                        dino.classList.remove('run-pose-1');
                        dino.classList.add('run-pose-2');
                        currentPose = 2;
                    } else {
                        dino.classList.remove('run-pose-2');
                        dino.classList.add('run-pose-1');
                        currentPose = 1;
                    }
                }
            } else if (isJumping) {
                dino.classList.remove('run-pose-2');
                dino.classList.add('run-pose-1');
                currentPose = 1;
            }
        }

        function updateClouds() {
            const cloudSpeed = speed * 0.4; 
            for (let i = clouds.length - 1; i >= 0; i--) {
                clouds[i].x -= cloudSpeed;
                clouds[i].element.style.left = `${clouds[i].x}px`;

                if (clouds[i].x < -100) {
                    container.removeChild(clouds[i].element);
                    clouds.splice(i, 1);
                }
            }

            const now = Date.now();
            if (now > nextCloudTime) {
                const cloudElement = document.createElement('div');
                cloudElement.classList.add('cloud');
                const randomTop = Math.random() * 120 + 10; 
                cloudElement.style.top = `${randomTop}px`;
                cloudElement.style.left = '800px';
                
                container.appendChild(cloudElement);
                clouds.push({ element: cloudElement, x: 800 });

                nextCloudTime = now + 1500 + Math.random() * 3000;
            }
        }

        function updateObstacles() {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= speed;
                obstacles[i].element.style.left = `${obstacles[i].x}px`;

                if (obstacles[i].x < -100) {
                    obstacleContainer.removeChild(obstacles[i].element);
                    obstacles.splice(i, 1);
                }
            }

            const now = Date.now();
            if (now > nextObstacleTime) {
                const random = Math.random();
                let obstacleType = (score > PLANE_DELAY_SCORE && random < 0.3) ? 'plane' : 'book';

                if (obstacleType === 'book') {
                    const bookElement = document.createElement('div');
                    bookElement.classList.add('book');
                    bookElement.style.left = '800px';
                    
                    const bookNum = Math.floor(Math.random() * 4) + 1; 
                    bookElement.style.backgroundImage = `url('book${bookNum}.png')`;
                    
                    obstacleContainer.appendChild(bookElement);
                    obstacles.push({ element: bookElement, x: 800, width: 60, height: 70, type: 'book' });
                } else if (obstacleType === 'plane') {
                    const planeElement = document.createElement('div');
                    planeElement.classList.add('paper-plane');
                    const planeLevels = ['high', 'mid', 'low'];
                    planeElement.classList.add(planeLevels[Math.floor(Math.random() * planeLevels.length)]);
                    planeElement.style.left = '800px';
                    obstacleContainer.appendChild(planeElement);
                    obstacles.push({ element: planeElement, x: 800, width: 70, height: 43, type: 'plane' });
                }

                nextObstacleTime = now + (1200 / (speed / 10)) + Math.random() * 1800;
            }
        }

        function checkCollisions() {
            const dinoRect = dino.getBoundingClientRect();
            
            const paddingX = isDucking ? 45 : 35;
            const paddingTop = isDucking ? 45 : 30;

            const dinoCollision = {
                left: dinoRect.left + paddingX,
                right: dinoRect.right - paddingX,
                top: dinoRect.top + paddingTop,
                bottom: dinoRect.bottom - 10
            };

            for (let obs of obstacles) {
                const obsRect = obs.element.getBoundingClientRect();
                const obsCollision = {
                    left: obsRect.left + 8,
                    right: obsRect.right - 8,
                    top: obsRect.top + 8,
                    bottom: obsRect.bottom - 5
                };

                if (dinoCollision.left < obsCollision.right &&
                    dinoCollision.right > obsCollision.left &&
                    dinoCollision.top < obsCollision.bottom &&
                    dinoCollision.bottom > obsCollision.top) {
                    endGame();
                    return;
                }
            }
        }

        function endGame() {
            isRunning = false;
            ground.classList.remove('moving-ground'); 
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            isRunning = true;
            gameOverScreen.style.display = 'none';
            ground.classList.add('moving-ground');
            score = 0;
            speed = 6;
            
            obstacles = [];
            obstacleContainer.innerHTML = '';
            clouds.forEach(c => container.removeChild(c.element));
            clouds = [];
            
            dinoBottom = DINO_INITIAL_BOTTOM;
            dinoVelocityY = 0;
            dino.className = 'run-pose-1'; 
            currentPose = 1;
            animationFrameCount = 0;
            isJumping = false;
            isDucking = false;
            nextObstacleTime = 0;
            nextCloudTime = 0;
            
            gameLoop();
        }

        function updateScore() {
            score++;
            const scoreStr = String(Math.floor(score / 10)).padStart(5, '0');
            scoreElement.innerText = 'SCORE:' + scoreStr;
            if (score % 500 === 0 && speed < 14) {
                speed += 0.5;
            }
        }

        // 💡 防止點擊 RESTART 按鈕時，冒泡事件重複觸發 container 的點擊事件
        restartButton.addEventListener('click', (e) => {
            e.stopPropagation();
            resetGame();
        });
        
        const initialCloud = document.createElement('div');
        initialCloud.classList.add('cloud');
        initialCloud.style.top = '50px';
        initialCloud.style.left = '400px';
        container.appendChild(initialCloud);
        clouds.push({ element: initialCloud, x: 400 });

    </script>
</body>
</html>
