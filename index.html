<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUSTOM PARKOUR GAME</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 350px; 
            background-color: transparent; 
            overflow: hidden;
            border: 4px solid #fff;
            cursor: pointer; 
        }

        .cloud {
            position: absolute;
            width: 100px;  
            height: 50px; 
            background-image: url('cloud.png');
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 5;
        }

        #ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%; 
            height: 40px; 
            background-image: url('ground.png');
            background-size: contain; 
            background-repeat: repeat-x; 
            z-index: 10;
        }
        @keyframes scrollGround {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .moving-ground {
            animation: scrollGround 3s linear infinite;
        }

        /* 主角站立：維持原尺寸 130x195 */
        #dino {
            position: absolute;
            bottom: 40px; 
            left: 50px;
            width: 130px;  
            height: 195px; 
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 20;
        }

        #dino.run-pose-1 { background-image: url('run1.png'); }
        #dino.run-pose-2 { background-image: url('run2.png'); }

        /* 💡 躺平形態再度放大：變成超巨型的 220x180 */
        #dino.duck {
            width: 220px;
            height: 180px; 
            background-image: url('duck.png') !important; 
        }

        #obstacle-container {
            position: absolute;
            bottom: 40px; 
            left: 0;
            width: 100%;
            height: calc(100% - 40px);
            z-index: 15;
        }

        /* 💡 書本放大：調整為 80x95 */
        .book {
            position: absolute;
            bottom: 0;     
            width: 80px;  
            height: 95px; 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
        }

        /* 💡 飛機放大：調整為 100x60 */
        .paper-plane {
            position: absolute;
            width: 100px;  
            height: 60px; 
            background-image: url('plane.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center center;
        }
        /* 重新調配飛機高度，確保與放大後的主角完美搭配 */
        .paper-plane.high { bottom: 200px; } /* 從頭上飛過，跳躍才會撞到 */
        .paper-plane.mid { bottom: 90px; }   /* 需要躺平才能躲過 */
        .paper-plane.low { bottom: 10px; }   /* 貼近地面，必須跳躍 */

        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 16px;
            color: #fff; 
            z-index: 30;
            text-shadow: 3px 3px 0px #000;
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75); 
            z-index: 50;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        #game-over-text {
            font-size: 36px;
            color: #ff3333; 
            margin-bottom: 30px;
            text-shadow: 4px 4px 0px #000;
        }
        
        #restart-button {
            font-family: 'Press Start 2P', monospace; 
            padding: 12px 24px;
            font-size: 14px;
            background-color: #fff;
            color: #000;
            border: 4px solid #000;
            cursor: pointer;
            box-shadow: 4px 4px 0px #555;
        }
        #restart-button:active {
            box-shadow: 1px 1px 0px #555;
            transform: translate(3px, 3px);
        }

        /* 💡 純英文電玩風格的開始畫面 */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 60;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #start-screen h2 {
            font-size: 32px;
            color: #ffffff;
            text-shadow: 4px 4px 0px #000;
            margin-bottom: 30px;
        }
        .blink-text {
            font-size: 16px;
            color: #ffffff;
            text-shadow: 2px 2px 0px #000;
            animation: blink 1s step-end infinite;
            margin-bottom: 40px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .controls {
            font-size: 10px;
            color: #aaa;
            text-shadow: 1px 1px 0px #000;
            line-height: 2;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score">SCORE:00000</div>
        <div id="ground"></div>
        <div id="dino" class="run-pose-1"></div>
        <div id="obstacle-container"></div>
        
        <div id="start-screen">
            <h2>GAME START</h2>
            <div class="blink-text">PRESS ANY KEY</div>
            <div class="controls">[SPACE / UP] JUMP<br>[DOWN] DUCK</div>
        </div>

        <div id="game-over-screen">
            <div id="game-over-text">GAME OVER</div>
            <button id="restart-button">RESTART</button>
        </div>
    </div>

    <script>
        window.focus(); 

        const container = document.getElementById('game-container');
        const dino = document.getElementById('dino');
        const ground = document.getElementById('ground');
        const obstacleContainer = document.getElementById('obstacle-container');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const restartButton = document.getElementById('restart-button');
        const startScreen = document.getElementById('start-screen');

        const GRAVITY = 1.6;          
        const JUMP_FORCE = -25;       
        const DINO_INITIAL_BOTTOM = 40;
        const PLANE_DELAY_SCORE = 150; 

        let isRunning = false;
        let isGameStarted = false;
        let isJumping = false;
        let isDucking = false;
        let dinoVelocityY = 0;
        let dinoBottom = DINO_INITIAL_BOTTOM;
        let score = 0;
        let speed = 6; 
        
        let obstacles = [];
        let clouds = [];
        let nextObstacleTime = 0;
        let nextCloudTime = 0;

        let animationFrameCount = 0;
        let currentPose = 1;

        function startGame() {
            if (isGameStarted) return;
            window.focus();
            isGameStarted = true;
            isRunning = true;
            startScreen.style.display = 'none';
            ground.classList.add('moving-ground');
            gameLoop();
        }

        document.addEventListener('keydown', (e) => {
            if (!isGameStarted) {
                if (e.code === 'Space' || e.key === ' ' || e.code === 'ArrowUp' || e.key === 'ArrowUp') {
                    startGame();
                    e.preventDefault(); 
                    return;
                }
            }
            
            if (!isRunning) return;
            
            if (e.code === 'Space' || e.key === ' ' || e.code === 'ArrowUp' || e.key === 'ArrowUp') {
                if (!isJumping && !isDucking) {
                    isJumping = true;
                    dinoVelocityY = JUMP_FORCE;
                }
                e.preventDefault();
            }
            if ((e.code === 'ArrowDown' || e.key === 'ArrowDown') && !isJumping && !isDucking) {
                isDucking = true;
                dino.classList.add('duck'); 
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (!isRunning) return;
            if (e.code === 'ArrowDown' || e.key === 'ArrowDown') {
                isDucking = false;
                dino.classList.remove('duck'); 
            }
        });

        container.addEventListener('click', () => {
            if (!isGameStarted) startGame();
        });

        function gameLoop() {
            if (!isRunning) return;
            updateDino();
            updateObstacles();
            updateClouds();
            updateScore();
            checkCollisions();
            requestAnimationFrame(gameLoop);
        }

        function updateDino() {
            if (isJumping) {
                dinoVelocityY += GRAVITY;
                dinoBottom -= dinoVelocityY;

                if (dinoBottom <= DINO_INITIAL_BOTTOM) {
                    dinoBottom = DINO_INITIAL_BOTTOM;
                    isJumping = false;
                    dinoVelocityY = 0;
                }
            }
            dino.style.bottom = `${dinoBottom}px`;

            if (!isJumping && !isDucking) {
                animationFrameCount++;
                if (animationFrameCount >= 9) { 
                    animationFrameCount = 0;
                    if (currentPose === 1) {
                        dino.classList.remove('run-pose-1');
                        dino.classList.add('run-pose-2');
                        currentPose = 2;
                    } else {
                        dino.classList.remove('run-pose-2');
                        dino.classList.add('run-pose-1');
                        currentPose = 1;
                    }
                }
            } else if (isJumping) {
                dino.classList.remove('run-pose-2');
                dino.classList.add('run-pose-1');
                currentPose = 1;
            }
        }

        function updateClouds() {
            const cloudSpeed = speed * 0.4; 
            for (let i = clouds.length - 1; i >= 0; i--) {
                clouds[i].x -= cloudSpeed;
                clouds[i].element.style.left = `${clouds[i].x}px`;

                if (clouds[i].x < -100) {
                    container.removeChild(clouds[i].element);
                    clouds.splice(i, 1);
                }
            }

            const now = Date.now();
            if (now > nextCloudTime) {
                const cloudElement = document.createElement('div');
                cloudElement.classList.add('cloud');
                const randomTop = Math.random() * 120 + 10; 
                cloudElement.style.top = `${randomTop}px`;
                cloudElement.style.left = '800px';
                
                container.appendChild(cloudElement);
                clouds.push({ element: cloudElement, x: 800 });

                nextCloudTime = now + 1500 + Math.random() * 3000;
            }
        }

        function updateObstacles() {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= speed;
                obstacles[i].element.style.left = `${obstacles[i].x}px`;

                if (obstacles[i].x < -100) {
                    obstacleContainer.removeChild(obstacles[i].element);
                    obstacles.splice(i, 1);
                }
            }

            const now = Date.now();
            if (now > nextObstacleTime) {
                const random = Math.random();
                let obstacleType = (score > PLANE_DELAY_SCORE && random < 0.3) ? 'plane' : 'book';

                if (obstacleType === 'book') {
                    const bookElement = document.createElement('div');
                    bookElement.classList.add('book');
                    bookElement.style.left = '800px';
                    
                    const bookNum = Math.floor(Math.random() * 4) + 1; 
                    bookElement.style.backgroundImage = `url('book${bookNum}.png')`;
                    
                    obstacleContainer.appendChild(bookElement);
                    obstacles.push({ element: bookElement, x: 800, width: 80, height: 95, type: 'book' });
                } else if (obstacleType === 'plane') {
                    const planeElement = document.createElement('div');
                    planeElement.classList.add('paper-plane');
                    const planeLevels = ['high', 'mid', 'low'];
                    planeElement.classList.add(planeLevels[Math.floor(Math.random() * planeLevels.length)]);
                    planeElement.style.left = '800px';
                    obstacleContainer.appendChild(planeElement);
                    obstacles.push({ element: planeElement, x: 800, width: 100, height: 60, type: 'plane' });
                }

                nextObstacleTime = now + (1200 / (speed / 10)) + Math.random() * 1800;
            }
        }

        function checkCollisions() {
            const dinoRect = dino.getBoundingClientRect();
            let dinoCollision;

            if (isDucking) {
                // 💡 終極修復：當躺平時，將碰撞判定區的「天花板」大幅下壓 (top + 100)，忽略圖片上半部透明空氣
                dinoCollision = {
                    left: dinoRect.left + 50,
                    right: dinoRect.right - 50,
                    top: dinoRect.top + 100, 
                    bottom: dinoRect.bottom - 10
                };
            } else {
                // 站立時的正常判定
                dinoCollision = {
                    left: dinoRect.left + 35,
                    right: dinoRect.right - 35,
                    top: dinoRect.top + 30,
                    bottom: dinoRect.bottom - 10
                };
            }

            for (let obs of obstacles) {
                const obsRect = obs.element.getBoundingClientRect();
                
                // 稍微縮小障礙物的判定箱，給玩家一點容錯率（特別是物件變大之後）
                const obsCollision = {
                    left: obsRect.left + 15,
                    right: obsRect.right - 15,
                    top: obsRect.top + 15,
                    bottom: obsRect.bottom - 10
                };

                if (dinoCollision.left < obsCollision.right &&
                    dinoCollision.right > obsCollision.left &&
                    dinoCollision.top < obsCollision.bottom &&
                    dinoCollision.bottom > obsCollision.top) {
                    endGame();
                    return;
                }
            }
        }

        function endGame() {
            isRunning = false;
            ground.classList.remove('moving-ground'); 
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            isRunning = true;
            gameOverScreen.style.display = 'none';
            ground.classList.add('moving-ground');
            score = 0;
            speed = 6;
            
            obstacles = [];
            obstacleContainer.innerHTML = '';
            clouds.forEach(c => container.removeChild(c.element));
            clouds = [];
            
            dinoBottom = DINO_INITIAL_BOTTOM;
            dinoVelocityY = 0;
            dino.className = 'run-pose-1'; 
            currentPose = 1;
            animationFrameCount = 0;
            isJumping = false;
            isDucking = false;
            nextObstacleTime = 0;
            nextCloudTime = 0;
            
            gameLoop();
        }

        function updateScore() {
            score++;
            const scoreStr = String(Math.floor(score / 10)).padStart(5, '0');
            scoreElement.innerText = 'SCORE:' + scoreStr;
            if (score % 500 === 0 && speed < 14) {
                speed += 0.5;
            }
        }

        restartButton.addEventListener('click', (e) => {
            e.stopPropagation();
            resetGame();
        });
        
        const initialCloud = document.createElement('div');
        initialCloud.classList.add('cloud');
        initialCloud.style.top = '50px';
        initialCloud.style.left = '400px';
        container.appendChild(initialCloud);
        clouds.push({ element: initialCloud, x: 400 });

    </script>
</body>
</html>
