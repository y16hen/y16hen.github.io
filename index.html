<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素紅土跑酷</title>
    <style>
        /* --- 遊戲基礎樣式 --- */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f7f7;
            font-family: Arial, sans-serif;
            overflow: hidden;
            image-rendering: pixelated; 
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 300px;
            background-color: #fff;
            overflow: hidden;
            border-bottom: 2px solid #535353;
            /* 背景網格 */
            background-image: 
                linear-gradient(45deg, rgba(200, 200, 200, 0.3) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(200, 200, 200, 0.3) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(200, 200, 200, 0.3) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(200, 200, 200, 0.3) 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
        }

        /* --- 雲朵 (純 CSS 繪製) --- */
        .cloud {
            position: absolute;
            width: 48px;
            height: 16px;
            background-color: transparent;
            z-index: 5; /* 放在主角和障礙物後方 */
            /* 像素雲朵形狀 */
            box-shadow:
                16px 0 0 0 #e0e0e0, 20px 0 0 0 #e0e0e0, 24px 0 0 0 #e0e0e0, 28px 0 0 0 #e0e0e0,
                8px 4px 0 0 #e0e0e0, 12px 4px 0 0 #e0e0e0, 16px 4px 0 0 #e0e0e0, 20px 4px 0 0 #e0e0e0, 24px 4px 0 0 #e0e0e0, 28px 4px 0 0 #e0e0e0, 32px 4px 0 0 #e0e0e0, 36px 4px 0 0 #e0e0e0,
                0px 8px 0 0 #e0e0e0, 4px 8px 0 0 #e0e0e0, 8px 8px 0 0 #e0e0e0, 12px 8px 0 0 #e0e0e0, 16px 8px 0 0 #e0e0e0, 20px 8px 0 0 #e0e0e0, 24px 8px 0 0 #e0e0e0, 28px 8px 0 0 #e0e0e0, 32px 8px 0 0 #e0e0e0, 36px 8px 0 0 #e0e0e0, 40px 8px 0 0 #e0e0e0, 44px 8px 0 0 #e0e0e0;
        }

        /* --- 地面 (紅土) --- */
        #ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 32px;
            background-color: #d17a6a; 
            display: flex;
            background-image: 
                linear-gradient(to right, transparent 0, transparent 4px, #a65147 4px, #a65147 8px);
            background-size: 16px 16px; 
            z-index: 10;
        }

        /* --- 主角設定 (讀取外部圖片) --- */
        #dino {
            position: absolute;
            bottom: 32px; 
            left: 50px;
            width: 60px;  
            height: 94px; 
            background-image: url('image_1.png'); /* 讀取站立/跑步圖片 */
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center bottom;
            image-rendering: pixelated; 
            z-index: 20;
        }

        /* 躺平 (蹲下) 形態 */
        #dino.duck {
            height: 52px; 
            background-image: url('image_2.png'); /* 讀取蹲下/躺平圖片 */
            background-position: center bottom;
        }

        /* --- 書本障礙物容器 --- */
        #obstacle-container {
            position: absolute;
            bottom: 32px;
            left: 0;
            width: 100%;
            height: calc(100% - 32px);
            z-index: 15;
        }

        .book-group {
            position: absolute;
            bottom: 0;
            display: flex;
            align-items: flex-end;
            image-rendering: pixelated;
        }

        /* --- 單本書本樣式 --- */
        .book {
            height: 100%;
            background-color: transparent;
            position: relative;
            box-shadow:
                0 0 0 4px #1a3c2a, 
                4px 0 0 0 #2d5d42 inset, 
                8px 0 0 0 #2d5d42 inset;
        }
        .book::after {
            content: "";
            position: absolute;
            top: 4px;
            right: 4px;
            width: 4px;
            height: 4px;
            background-color: #2d5d42; 
        }
        
        .book.brown {
            box-shadow:
                0 0 0 4px #5e3a2c, 
                4px 0 0 0 #7e5c4d inset, 
                8px 0 0 0 #7e5c4d inset;
        }
        .book.brown::after {
            background-color: #7e5c4d; 
        }

        .book.thin { width: 16px; }
        .book.thick { width: 32px; }
        .book.low { height: 32px; }
        .book.mid { height: 48px; }
        .book.high { height: 64px; }
        .book + .book { margin-left: 8px; }

        /* --- 紙飛機烏鴉樣式 --- */
        .paper-plane {
            position: absolute;
            width: 40px;
            height: 24px;
            background-color: transparent;
            z-index: 18;
            image-rendering: pixelated;
        }
        
        .paper-plane::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            box-shadow:
                4px 0px 0 0 #535353, 8px 0px 0 0 #535353, 12px 0px 0 0 #535353, 16px 0px 0 0 #535353, 20px 0px 0 0 #535353,
                24px 0px 0 0 #535353, 28px 0px 0 0 #535353, 32px 0px 0 0 #535353, 36px 0px 0 0 #535353, 40px 0px 0 0 #535353,
                0px 4px 0 0 #535353, 4px 4px 0 0 #fff, 8px 4px 0 0 #fff, 12px 4px 0 0 #fff, 16px 4px 0 0 #fff,
                20px 4px 0 0 #fff, 24px 4px 0 0 #fff, 28px 4px 0 0 #fff, 32px 4px 0 0 #fff, 36px 4px 0 0 #535353,
                4px 8px 0 0 #535353, 8px 8px 0 0 #fff, 12px 8px 0 0 #fff, 16px 8px 0 0 #fff, 20px 8px 0 0 #fff,
                24px 8px 0 0 #fff, 28px 8px 0 0 #fff, 32px 8px 0 0 #535353,
                8px 12px 0 0 #535353, 12px 12px 0 0 #fff, 16px 12px 0 0 #fff, 20px 12px 0 0 #fff,
                24px 12px 0 0 #535353,
                12px 16px 0 0 #535353, 16px 16px 0 0 #fff, 20px 16px 0 0 #535353,
                16px 20px 0 0 #535353;
        }

        .paper-plane.high { bottom: 100px; } 
        .paper-plane.mid { bottom: 60px; } 
        .paper-plane.low { bottom: 20px; } 

        /* --- UI 介面 --- */
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
            color: #535353;
            font-weight: bold;
            z-index: 30;
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            z-index: 50;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #game-over-text {
            font-size: 30px;
            color: #535353;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #restart-button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #535353;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 14px;
            color: #535353;
            z-index: 30;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score">00000</div>
        <div id="ground"></div>
        <div id="dino"></div>
        <div id="obstacle-container"></div>
        
        <div id="game-over-screen">
            <div id="game-over-text">GAME OVER</div>
            <button id="restart-button">重新開始</button>
        </div>
        
        <div id="instructions">【空白鍵】跳躍，按
